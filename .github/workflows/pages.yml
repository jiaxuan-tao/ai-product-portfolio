name: Deploy Vibe Coding Lab

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            prompt-manager/package-lock.json
            what-to-eat/package-lock.json
      - name: Install Prompt Manager
        working-directory: prompt-manager
        run: npm ci
      - name: Type check
        working-directory: prompt-manager
        run: npx tsc --noEmit
      - name: Test
        working-directory: prompt-manager
        run: npm test
      - name: Test Poker EV Coach
        working-directory: poker-ev-coach
        run: npm test
      - name: Test What to Eat
        working-directory: what-to-eat
        run: npm test
      - name: Install What to Eat browser tests
        working-directory: what-to-eat
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Test What to Eat in Chromium
        working-directory: what-to-eat
        run: npm run test:browser
      - name: Build Prompt Manager
        working-directory: prompt-manager
        run: npm run build
      - name: Assemble portfolio site
        run: |
          mkdir -p _site/assets _site/poker-ev-coach _site/prompt-manager _site/vibe-coding-prompt-library _site/what-to-eat/assets
          cp site/index.html _site/index.html
          cp site/favicon.svg _site/favicon.svg
          cp prompt-manager/docs/screenshots/home.png _site/assets/prompt-manager.png
          cp poker-ev-coach/docs/images/poker-ev-coach-preview.png _site/assets/poker-ev-coach.png
          cp vibe-coding-prompt-library/assets/vibe-coding-prompt-library-preview.png _site/assets/vibe-coding-prompt-library.png
          cp quota-float-native/docs/images/quota-states.png _site/assets/quota-float-native.png
          cp what-to-eat/docs/images/what-to-eat-preview.png _site/assets/what-to-eat.png
          cp -R prompt-manager/dist/. _site/prompt-manager/
          cp poker-ev-coach/index.html poker-ev-coach/styles.css poker-ev-coach/app.js poker-ev-coach/poker.js poker-ev-coach/decision.js poker-ev-coach/amount-controls.js _site/poker-ev-coach/
          cp -R vibe-coding-prompt-library/app/. _site/vibe-coding-prompt-library/
          cp what-to-eat/*.html what-to-eat/*.css what-to-eat/*.js what-to-eat/*.svg _site/what-to-eat/
          cp -R what-to-eat/assets/. _site/what-to-eat/assets/
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
