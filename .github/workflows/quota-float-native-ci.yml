name: Quota Float Native CI

on:
  push:
    paths:
      - "quota-float-native/**"
      - ".github/workflows/quota-float-native-ci.yml"
      - ".github/workflows/quota-float-native-release.yml"
  pull_request:
    paths:
      - "quota-float-native/**"
      - ".github/workflows/quota-float-native-ci.yml"
      - ".github/workflows/quota-float-native-release.yml"

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quota-float-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: quota-float-native/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: quota-float-native-windows-unsigned
            build-command: npm run tauri -- build
            artifact-path: quota-float-native/src-tauri/target/release/bundle/**
          - os: macos-latest
            artifact-name: quota-float-native-macos-universal-unsigned
            build-command: npm run tauri -- build --target universal-apple-darwin
            artifact-path: quota-float-native/src-tauri/target/universal-apple-darwin/release/bundle/**
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: quota-float-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: quota-float-native/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: quota-float-native/src-tauri
      - run: npm ci
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: ${{ matrix.build-command }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14
